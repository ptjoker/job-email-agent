<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Email Agent</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --line: #d8dde6;
        --text: #171b22;
        --muted: #5e6878;
        --accent: #0f766e;
        --accent-dark: #115e59;
        --warn: #a15c00;
        --good: #237141;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
      }

      aside {
        background: #ffffff;
        border-right: 1px solid var(--line);
        padding: 20px;
      }

      main {
        padding: 24px;
      }

      h1 {
        font-size: 22px;
        margin: 0 0 6px;
      }

      h2 {
        font-size: 18px;
        margin: 0 0 12px;
      }

      p {
        color: var(--muted);
        line-height: 1.45;
      }

      .status-list {
        display: grid;
        gap: 10px;
        margin-top: 20px;
      }

      .status-item {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 14px;
      }

      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 2px 8px;
        white-space: nowrap;
      }

      .ok {
        color: var(--good);
      }

      .missing {
        color: var(--warn);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 18px;
      }

      button {
        border: 1px solid var(--line);
        background: #ffffff;
        color: var(--text);
        border-radius: 6px;
        padding: 9px 12px;
        cursor: pointer;
      }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #ffffff;
      }

      button.primary:hover {
        background: var(--accent-dark);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1.3fr) minmax(360px, 0.7fr);
        gap: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
        min-width: 0;
      }

      .jobs {
        display: grid;
        gap: 10px;
        max-height: calc(100vh - 170px);
        overflow: auto;
        padding-right: 4px;
      }

      .job {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        display: grid;
        gap: 8px;
        background: #ffffff;
      }

      .job-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
      }

      .job-title {
        font-weight: 700;
        line-height: 1.35;
      }

      .meta,
      .snippet,
      .reasons {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .score {
        min-width: 58px;
        text-align: center;
        font-weight: 700;
        border-radius: 6px;
        border: 1px solid var(--line);
        padding: 6px;
      }

      pre {
        background: #101418;
        color: #e8edf2;
        border-radius: 8px;
        padding: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        min-height: 160px;
        max-height: 330px;
        overflow: auto;
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 22px;
        text-align: center;
      }

      @media (max-width: 900px) {
        .app,
        .grid {
          grid-template-columns: 1fr;
        }

        aside {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const { useEffect, useMemo, useState } = React;

      function App() {
        const [status, setStatus] = useState({});
        const [jobs, setJobs] = useState([]);
        const [queue, setQueue] = useState("");
        const [busy, setBusy] = useState("");
        const [output, setOutput] = useState("Ready.");

        async function request(path, options = {}) {
          const response = await fetch(path, {
            headers: { "Content-Type": "application/json" },
            ...options,
          });
          return response.json();
        }

        async function refresh() {
          const [statusData, jobsData] = await Promise.all([
            request("/api/status"),
            request("/api/jobs"),
          ]);
          setStatus(statusData);
          setJobs(jobsData.jobs || []);
          setQueue(jobsData.queue || "");
        }

        async function runAction(label, path, body) {
          setBusy(label);
          setOutput(`${label} started...`);
          try {
            const result = await request(path, {
              method: "POST",
              body: body ? JSON.stringify(body) : "{}",
            });
            setOutput([result.stdout, result.stderr].filter(Boolean).join("\\n") || JSON.stringify(result, null, 2));
            await refresh();
          } catch (error) {
            setOutput(String(error));
          } finally {
            setBusy("");
          }
        }

        useEffect(() => {
          refresh();
        }, []);

        const topJobs = useMemo(() => jobs.slice(0, 50), [jobs]);

        return (
          React.createElement("div", { className: "app" },
            React.createElement("aside", null,
              React.createElement("h1", null, "Job Email Agent"),
              React.createElement("p", null, "Local dashboard for email triage, ranked jobs, cover letters, and application drafts."),
              React.createElement("div", { className: "status-list" },
                React.createElement(StatusItem, { label: "Config", ok: status.hasConfig }),
                React.createElement(StatusItem, { label: "Profile", ok: status.hasProfile }),
                React.createElement(StatusItem, { label: "Credentials", ok: status.hasCredentials }),
                React.createElement(StatusItem, { label: "Gmail token", ok: status.hasToken })
              ),
              React.createElement("p", null, queue ? `Queue: ${queue}` : "No ranked queue yet.")
            ),
            React.createElement("main", null,
              React.createElement("div", { className: "toolbar" },
                React.createElement("button", { onClick: refresh, disabled: !!busy }, "Refresh"),
                React.createElement("button", { className: "primary", onClick: () => runAction("Dry run", "/api/dry-run"), disabled: !!busy }, "Run Dry Run"),
                React.createElement("button", { onClick: () => runAction("Daily run", "/api/run-daily"), disabled: !!busy }, "Run Daily")
              ),
              React.createElement("div", { className: "grid" },
                React.createElement("section", { className: "panel" },
                  React.createElement("h2", null, "Ranked Jobs"),
                  topJobs.length
                    ? React.createElement("div", { className: "jobs" },
                        topJobs.map((job, index) =>
                          React.createElement(JobCard, {
                            key: `${job.message_id}-${index}`,
                            job,
                            index,
                            busy,
                            onPrepare: () => runAction(`Cover letter for job ${index + 1}`, "/api/prepare", { jobIndex: index + 1 }),
                          })
                        )
                      )
                    : React.createElement("div", { className: "empty" }, "Run a dry run to load ranked jobs.")
                ),
                React.createElement("section", { className: "panel" },
                  React.createElement("h2", null, "Output"),
                  React.createElement("pre", null, busy ? `${busy} is running...\\n\\n${output}` : output)
                )
              )
            )
          )
        );
      }

      function StatusItem({ label, ok }) {
        return React.createElement("div", { className: "status-item" },
          React.createElement("span", null, label),
          React.createElement("span", { className: `pill ${ok ? "ok" : "missing"}` }, ok ? "Ready" : "Missing")
        );
      }

      function JobCard({ job, index, busy, onPrepare }) {
        const title = job.subject || job.title || "(no title)";
        const source = job.sender || "unknown source";
        const reasons = (job.reasons || []).join("; ");
        const links = job.links || [];

        return React.createElement("article", { className: "job" },
          React.createElement("div", { className: "job-head" },
            React.createElement("div", null,
              React.createElement("div", { className: "job-title" }, `${index + 1}. ${title}`),
              React.createElement("div", { className: "meta" }, source)
            ),
            React.createElement("div", { className: "score" }, job.score || 0)
          ),
          React.createElement("div", { className: "snippet" }, job.snippet || "No preview available."),
          React.createElement("div", { className: "reasons" }, reasons),
          React.createElement("div", { className: "toolbar" },
            React.createElement("button", { className: "primary", onClick: onPrepare, disabled: !!busy }, "Cover Letter"),
            links[0] ? React.createElement("button", { onClick: () => window.open(links[0], "_blank") }, "Open Job") : null
          )
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
    </script>
  </body>
</html>
